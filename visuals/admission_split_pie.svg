<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" role="img" aria-labelledby="title">
  <title>Admission Split</title>
  <defs>
    <linearGradient id="cardGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f7fb" />
      <stop offset="100%" stop-color="#e8eef8" />
    </linearGradient>
  </defs>
  <style>
    .title { font: 700 24px Georgia, 'Times New Roman', serif; fill: #0f172a; }
    .subtitle { font: 600 13px 'Segoe UI', Tahoma, sans-serif; fill: #475569; }
    .label { font: 600 12px 'Segoe UI', Tahoma, sans-serif; fill: #334155; }
    .axis { font: 11px 'Segoe UI', Tahoma, sans-serif; fill: #64748b; }
    .value { font: 700 12px 'Segoe UI', Tahoma, sans-serif; fill: #0f172a; }
    .grid { stroke: #d7e0ea; stroke-width: 1; stroke-dasharray: 4 6; }
  </style>
  <rect x="0" y="0" width="900" height="480" rx="28" fill="url(#cardGlow)" />
  
  <text class="title" x="42" y="48">Admission Split</text>
  <text class="subtitle" x="42" y="76">Share of admitted versus non-admitted patients</text>
  <path d="M 270 250 L 270.00 105.00 A 145 145 0 1 1 269.60 395.00 Z" fill="#0f766e" stroke="#ffffff" stroke-width="3" /><path d="M 270 250 L 269.60 395.00 A 145 145 0 0 1 270.00 105.00 Z" fill="#f59e0b" stroke="#ffffff" stroke-width="3" />
  <circle cx="270" cy="250" r="62" fill="#f8fafc" />
  <text class="value" x="270" y="246" text-anchor="middle">Total</text>
  <text class="title" x="270" y="278" text-anchor="middle" style="font-size: 28px;">9,216</text>
  <rect x="560" y="144" width="18" height="18" rx="4" fill="#0f766e" /><text class="label" x="590" y="160">Admitted</text><text class="value" x="590" y="180">4,612 patients (50.04%)</text><rect x="560" y="198" width="18" height="18" rx="4" fill="#f59e0b" /><text class="label" x="590" y="214">Not Admitted</text><text class="value" x="590" y="234">4,604 patients (49.96%)</text>

</svg>
